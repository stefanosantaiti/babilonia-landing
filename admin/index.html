<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestione Appuntamenti</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #1a1a2e; 
            min-height: 100vh; 
            padding: 20px; 
            color: #333; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { 
            text-align: center; 
            padding: 30px 20px; 
            color: #fff; 
            background: linear-gradient(135deg, #d4af37 0%, #c5a028 100%);
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 1.8rem; font-weight: 300; }
        .card { 
            background: #fff; 
            border-radius: 16px; 
            padding: 25px; 
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 { 
            color: #1a1a2e; 
            margin-bottom: 20px; 
            font-size: 1.3rem;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 10px;
        }
        .card h3 {
            color: #1a1a2e;
            margin: 20px 0 10px 0;
            font-size: 1.1rem;
        }
        .seller-select { 
            width: 100%; 
            padding: 15px; 
            font-size: 1rem; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            margin-bottom: 20px;
        }
        .btn { 
            padding: 12px 24px; 
            background: linear-gradient(135deg, #d4af37 0%, #c5a028 100%); 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            cursor: pointer; 
            margin: 5px;
        }
        .btn-secondary {
            background: #1a1a2e;
        }
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .slot {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .slot-available {
            background: #2ecc71;
            color: white;
        }
        .slot:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .config-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .days-grid, .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
        }
        .checkbox-label input {
            margin-right: 8px;
            width: 18px;
            height: 18px;
        }
        .checkbox-label:has(input:checked) {
            border-color: #d4af37;
            background: #fff8e1;
        }
        .appointments-list {
            margin-top: 20px;
        }
        .appointment {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #d4af37;
        }
        .appointment-header {
            font-weight: 600;
            color: #1a1a2e;
        }
        .appointment-details {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        .loading {
            text-align: center;
            color: #888;
            padding: 20px;
        }
        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        @media (max-width: 600px) {
            .days-grid, .time-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Gestione Appuntamenti</h1>
            <p>Admin Console - BABILONIA Booking</p>
        </div>

        <!-- Login -->
        <div class="card" id="login-card">
            <h2>🔐 Seleziona Consulente</h2>
            <select id="seller-select" class="seller-select">
                <option value="">-- Seleziona --</option>
            </select>
            <button class="btn" onclick="login()">Accedi</button>
            <div id="login-status" class="status-message"></div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" style="display: none;">
            <!-- Configurazione -->
            <div class="card">
                <h2>⚙️ Configura Disponibilità</h2>
                <div id="config-form">
                    <div class="loading">Caricamento...</div>
                </div>
                <div id="config-status" class="status-message"></div>
            </div>

            <!-- Azioni -->
            <div class="card">
                <h2>⚡ Azioni</h2>
                <button class="btn" onclick="generateSlots()">🔄 Genera Slot 14 Giorni</button>
                <div id="action-status" class="status-message"></div>
            </div>

            <!-- Slot -->
            <div class="card">
                <h2>📅 Slot Disponibili (Clicca per disattivare)</h2>
                <div id="slots-container" class="loading">Seleziona configurazione e genera slot...</div>
            </div>

            <!-- Appuntamenti -->
            <div class="card">
                <h2>👥 Appuntamenti Confermati</h2>
                <div id="appointments-container" class="loading">Caricamento...</div>
            </div>
        </div>
    </div>

    <script type="module" src="./admin.js"></script>
</body>
</html>
