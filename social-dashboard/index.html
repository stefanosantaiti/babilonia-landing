<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABILONIA - Social Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; padding: 30px 0; border-bottom: 2px solid #d4af37; margin-bottom: 30px; }
        header h1 { font-size: 2rem; color: #d4af37; margin-bottom: 10px; }
        header p { color: #aaa; font-size: 1rem; }
        .stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 20px 30px; border-radius: 10px; text-align: center; border: 1px solid rgba(212,175,55,0.3); }
        .stat-card .number { font-size: 2rem; color: #d4af37; font-weight: bold; }
        .stat-card .label { color: #888; font-size: 0.9rem; margin-top: 5px; }
        .post-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .post-id { color: #888; font-size: 0.85rem; }
        .post-status { color: #d4af37; font-weight: bold; }
        .post-meta { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; font-size: 0.85rem; color: #888; }
        .post-content { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; margin-bottom: 15px; line-height: 1.6; white-space: pre-wrap; font-size: 0.95rem; }
        .post-hashtags { color: #d4af37; font-size: 0.9rem; margin-bottom: 20px; }
        .post-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }
        .btn-preview { background: #17a2b8; color: white; }
        .empty-state { text-align: center; padding: 60px 20px; color: #888; }
        .empty-state h2 { margin-bottom: 15px; color: #d4af37; }
        .loading { text-align: center; padding: 40px; color: #d4af37; }
        .error { color: #ff4444; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎸 BABILONIA Social Dashboard</h1>
            <p>Revisione e approvazione post social</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="pending-count">0</div>
                <div class="label">In Attesa</div>
            </div>
            <div class="stat-card">
                <div class="number" id="approved-count">0</div>
                <div class="label">Approvati</div>
            </div>
            <div class="stat-card">
                <div class="number" id="published-count">0</div>
                <div class="label">Pubblicati</div>
            </div>
        </div>

        <div id="posts-container">
            <div class="loading">⏳ Caricamento post...</div>
        </div>
    </div>

<script>
const SUPABASE_URL = 'https://esgjushznmidzdhqsyyx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZ2p1c2h6bm1pZHpkaHFzeXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTYwMTcsImV4cCI6MjA5MTIzMjAxN30.cKWfWEkgRTtPKbUduGgNxX6gF18Gqkjg2bWn6twQTbs';

let posts = [];

async function loadPosts() {
    const container = document.getElementById('posts-container');
    
    try {
        const timestamp = new Date().getTime();
        const response = await fetch(`${SUPABASE_URL}/rest/v1/social_posts?select=*&order=created_at.desc&ts=${timestamp}`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (!response.ok) throw new Error('HTTP ' + response.status);
        
        posts = await response.json();
        
        const pending = posts.filter(p => p.status === 'pending' || p.status === 'pending_approval');
        const approved = posts.filter(p => p.status === 'approved');
        
        document.getElementById('pending-count').textContent = pending.length;
        document.getElementById('approved-count').textContent = approved.length;
        
        if (pending.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h2>🎉 Nessun post in attesa!</h2>
                    <p>I post verranno generati automaticamente dal News Scout.</p>
                    <p style="margin-top: 20px; color: #d4af37;">Prossima generazione: domattina alle 7:00</p>
                </div>
            `;
            return;
        }
        
        let html = '';
        pending.forEach(post => {
            html += `
                <div class="post-card">
                    <div class="post-header">
                        <span class="post-id">#${post.id}</span>
                        <span class="post-status">⏳ ${post.status}</span>
                    </div>
                    <div class="post-meta">
                        <span>📰 ${post.source || 'Fonte sconosciuta'}</span>
                    </div>
                    <div class="post-content">${escapeHtml(post.body)}</div>
                    <div class="post-hashtags">${post.hashtags || ''}</div>
                    <div class="post-actions">
                        <button class="btn btn-approve" onclick="approvePost(${post.id})">✅ Approva</button>
                        <button class="btn btn-reject" onclick="rejectPost(${post.id})">❌ Rifiuta</button>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        
    } catch (err) {
        container.innerHTML = `<div class="error">❌ Errore: ${err.message}</div>`;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function approvePost(id) {
    if (!confirm('Approvare questo post?')) return;
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/social_posts?id=eq.${id}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ status: 'approved' })
        });
        
        if (response.ok) {
            alert('✅ Post approvato!');
            loadPosts();
        } else {
            alert('❌ Errore durante l\'approvazione');
        }
    } catch (err) {
        alert('❌ Errore: ' + err.message);
    }
}

async function rejectPost(id) {
    if (!confirm('Rifiutare questo post?')) return;
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/social_posts?id=eq.${id}`, {
            method: 'DELETE',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (response.ok) {
            alert('🗑️ Post rimosso');
            loadPosts();
        } else {
            alert('❌ Errore durante la rimozione');
        }
    } catch (err) {
        alert('❌ Errore: ' + err.message);
    }
}

// Carica all'avvio
loadPosts();

// Aggiorna ogni 30 secondi
setInterval(loadPosts, 30000);
</script>
</body>
</html>
