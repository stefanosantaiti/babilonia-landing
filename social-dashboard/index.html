<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BABILONIA - Social Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 30px;
        }
        header h1 { font-size: 2rem; color: #d4af37; margin-bottom: 10px; }
        header p { color: #aaa; font-size: 1rem; }
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px 30px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(212,175,55,0.3);
        }
        .stat-card .number { font-size: 2rem; color: #d4af37; font-weight: bold; }
        .stat-card .label { color: #888; font-size: 0.9rem; margin-top: 5px; }
        .post-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .post-id { color: #888; font-size: 0.85rem; }
        .post-score {
            background: rgba(212,175,55,0.2);
            color: #d4af37;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .post-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #888;
        }
        .post-meta span { display: flex; align-items: center; gap: 5px; }
        .post-source { color: #d4af37; font-weight: 500; }
        .post-template {
            background: rgba(255,255,255,0.1);
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
        }
        .post-content {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .post-hashtags {
            color: #d4af37;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .post-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-approve { background: #28a745; color: white; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-preview { background: #17a2b8; color: white; }
        .btn-reject { background: #dc3545; color: white; }
        .edit-mode { margin: 20px 0; }
        .edit-mode textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #d4af37;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }
        .edit-actions { display: flex; gap: 10px; margin-top: 15px; }
        .preview-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .preview-content {
            background: white;
            color: #333;
            max-width: 500px;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }
        .preview-header {
            background: #f0f2f5;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }
        .preview-body { padding: 20px; }
        .preview-text { line-height: 1.6; white-space: pre-wrap; }
        .close-preview {
            position: absolute;
            top: 20px; right: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 40px; height: 40px;
            cursor: pointer;
            font-size: 1.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state h2 { margin-bottom: 15px; color: #d4af37; }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        .badge-pending { background: rgba(212,175,55,0.3); color: #d4af37; }
        .badge-approved { background: rgba(40,167,69,0.3); color: #28a745; }
        .status-approved { border-left: 3px solid #28a745; }
        .section-title { color: #d4af37; margin: 30px 0 15px; font-size: 1.3rem; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎸 BABILONIA Social Dashboard</h1>
            <p>Revisione e approvazione post social - RSS Reali</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="pending-count">0</div>
                <div class="label">In Attesa</div>
            </div>
            <div class="stat-card">
                <div class="number" id="approved-count">0</div>
                <div class="label">Approvati</div>
            </div>
            <div class="stat-card">
                <div class="number" id="published-count">0</div>
                <div class="label">Pubblicati</div>
            </div>
        </div>

        <div id="posts-container"></div>

        <div class="empty-state" id="empty-state" style="display: none;">
            <h2>🎉 Nessun post in attesa!</h2>
            <p>I post verranno generati automaticamente dal RSS Scout.</p>
            <p style="margin-top: 20px; color: #d4af37;">Prossima generazione: domattina alle 7:30</p>
        </div>

        <h2 class="section-title">✅ Post Approvati</h2>
        <div id="approved-container"></div>
    </div>

    <div class="preview-modal" id="preview-modal">
        <div class="preview-content">
            <div class="preview-header">
                <span>👤</span>
                <span>Stefano Santaiti</span>
            </div>
            <div class="preview-body">
                <div class="preview-text" id="preview-text"></div>
                <div style="color: #1877f2; font-size: 0.9rem; margin-top: 15px;">👍 ❤️ 😲 💬 🔄</div>
            </div>
        </div>
        <button class="close-preview" onclick="closePreview()">×</button>
    </div>

    <script src="./dashboard-v2.js?v=2"></script>
</body>
</html>
