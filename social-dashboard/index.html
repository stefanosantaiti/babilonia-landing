<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABILONIA - Social Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 15px; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            color: #fff; 
            line-height: 1.5;
        }
        h1 { color: #d4af37; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.9rem; }
        .stats { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px 25px; border-radius: 8px; text-align: center; border: 1px solid rgba(212,175,55,0.3); }
        .stat-number { font-size: 1.8rem; color: #d4af37; font-weight: bold; }
        .stat-label { color: #888; font-size: 0.85rem; }
        h2 { color: #d4af37; border-bottom: 2px solid #d4af37; padding-bottom: 8px; margin-top: 30px; margin-bottom: 15px; }
        .post { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 10px; 
            padding: 20px; 
            margin-bottom: 20px;
        }
        .post-pending { border-left: 4px solid #d4af37; }
        .post-approved { border-left: 4px solid #28a745; opacity: 0.9; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: #888; font-size: 0.85rem; }
        .post-title { font-size: 1.1rem; margin-bottom: 10px; }
        .post-content { 
            background: rgba(0,0,0,0.2); 
            padding: 15px; 
            border-radius: 6px; 
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .hashtags { color: #d4af37; font-size: 0.9rem; margin: 10px 0; }
        .btn { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem;
            margin-right: 10px;
            margin-top: 10px;
        }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }
        .btn-preview { background: #1877f2; color: white; }
        .btn-edit { background: #6c757d; color: white; }
        .preview-box {
            background: #fff;
            color: #1c1e21;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            border: 1px solid #dddfe2;
        }
        .preview-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .preview-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 1.2rem;
        }
        .preview-name {
            font-weight: 600;
            color: #050505;
            font-size: 0.95rem;
        }
        .preview-time {
            color: #65676b;
            font-size: 0.8rem;
        }
        .preview-content {
            line-height: 1.5;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }
        .preview-hashtags {
            color: #1877f2;
        }
        .edit-form {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .edit-form textarea {
            width: 100%;
            min-height: 200px;
            background: #1a1a2e;
            color: #fff;
            border: 1px solid #d4af37;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.95rem;
            resize: vertical;
        }
        .edit-form label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
        }
        .loading { color: #d4af37; text-align: center; padding: 40px; }
        .error { color: #ff4444; text-align: center; padding: 40px; }
        .source { color: #888; font-size: 0.85rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>🎸 BABILONIA</h1>
    <div class="subtitle">Social Dashboard - Approvazione Post</div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-number" id="pending-count">0</div>
            <div class="stat-label">In Attesa</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="approved-count">0</div>
            <div class="stat-label">Approvati</div>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" onclick="setTarget('clienti')" id="btn-clienti" style="background: #d4af37; color: #000;">Per Clienti</button>
        <button class="btn" onclick="setTarget('collaboratori')" id="btn-collaboratori" style="background: transparent; color: #d4af37; border: 1px solid #d4af37;">Per Collaboratori</button>
    </div>

    <div id="loading"><div class="loading">⏳ Caricamento post...</div></div>
    <div id="content"></div>

<script>
const SUPABASE_URL = 'https://esgjushznmidzdhqsyyx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZ2p1c2h6bm1pZHpkaHFzeXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTYwMTcsImV4cCI6MjA5MTIzMjAxN30.cKWfWEkgRTtPKbUduGgNxX6gF18Gqkjg2bWn6twQTbs';

let currentTarget = 'clienti';

function setTarget(target) {
    currentTarget = target;
    document.getElementById('btn-clienti').style.background = target === 'clienti' ? '#d4af37' : 'transparent';
    document.getElementById('btn-clienti').style.color = target === 'clienti' ? '#000' : '#d4af37';
    document.getElementById('btn-collaboratori').style.background = target === 'collaboratori' ? '#d4af37' : 'transparent';
    document.getElementById('btn-collaboratori').style.color = target === 'collaboratori' ? '#000' : '#d4af37';
    loadPosts();
}

async function loadPosts() {
    const loading = document.getElementById('loading');
    const content = document.getElementById('content');
    
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/social_posts?select=*&order=created_at.desc`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        
        if (!res.ok) throw new Error('HTTP ' + res.status);
        
        const posts = await res.json();
        
        // Filtra per target (fino a quando non c'è campo target_audience nel DB)
        const filtered = posts.filter(p => {
            if (currentTarget === 'clienti') {
                // Post clienti: contengono parole chiave clienti o NON contengono parole collaboratori
                const text = (p.title + ' ' + p.body).toLowerCase();
                const collabWords = ['network', 'libertà', 'autonomia', 'business', 'carriera', 'collabora'];
                const isCollaboratore = collabWords.some(w => text.includes(w));
                return !isCollaboratore; // Se non è collaboratore, è cliente
            } else {
                // Post collaboratori: contengono parole chiave specifiche
                const text = (p.title + ' ' + p.body).toLowerCase();
                const collabWords = ['network', 'libertà', 'autonomia', 'business', 'carriera', 'collabora', 'opportunità professionale'];
                return collabWords.some(w => text.includes(w));
            }
        });
        
        const pending = filtered.filter(p => p.status === 'pending' || p.status === 'pending_approval');
        const approved = filtered.filter(p => p.status === 'approved');
        
        document.getElementById('pending-count').textContent = pending.length;
        document.getElementById('approved-count').textContent = approved.length;
        
        loading.innerHTML = '';
        let html = '';
        
        // Post in attesa
        if (pending.length > 0) {
            html += '<h2>⏳ In Attesa di Approvazione</h2>';
            pending.forEach(p => {
                html += `<div class="post post-pending">`;
                html += `<div class="post-header"><span>#${p.id}</span><span>${p.status}</span></div>`;
                html += `<div class="source">📰 ${p.source || 'Fonte sconosciuta'}</div>`;
                html += `<div class="post-title">${p.title}</div>`;
                html += `<div class="post-content">${escapeHtml(p.body)}</div>`;
                html += `<div class="hashtags">${p.hashtags || ''}</div>`;
                html += `<button class="btn btn-preview" onclick="previewPost(${p.id}, 'facebook')">👁️ Anteprima Facebook</button>`;
                html += `<button class="btn btn-edit" onclick="editPost(${p.id}, '${escapeHtml(p.title)}', '${escapeHtml(p.body)}', '${escapeHtml(p.hashtags || '')}')">✏️ Modifica</button>`;
                html += `<button class="btn btn-approve" onclick="approvePost(${p.id})">✅ Approva</button>`;
                html += `<button class="btn btn-reject" onclick="rejectPost(${p.id})">❌ Rifiuta</button>`;
                html += `<div id="preview-${p.id}" style="display:none;"></div>`;
                html += `<div id="edit-${p.id}" style="display:none;"></div>`;
                html += `</div>`;
            });
        } else {
            html += '<div style="text-align:center;padding:40px;color:#888;"><h2>🎉 Nessun post in attesa!</h2><p>Prossima generazione: domattina alle 7:00</p></div>';
        }
        
        // Post approvati
        if (approved.length > 0) {
            html += '<h2>✅ Post Approvati</h2>';
            approved.forEach(p => {
                html += `<div class="post post-approved">`;
                html += `<div class="post-header"><span>#${p.id}</span><span style="color:#28a745;">✅ ${p.status}</span></div>`;
                html += `<div class="source">📰 ${p.source || 'Fonte sconosciuta'}</div>`;
                html += `<div class="post-title">${p.title}</div>`;
                html += `<div class="post-content">${escapeHtml(p.body)}</div>`;
                html += `<div class="hashtags">${p.hashtags || ''}</div>`;
                html += `</div>`;
            });
        }
        
        content.innerHTML = html;
        
    } catch (err) {
        loading.innerHTML = `<div class="error">❌ Errore: ${err.message}</div>`;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function approvePost(id) {
    if (!confirm('Approvare questo post?')) return;
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/social_posts?id=eq.${id}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ status: 'approved' })
        });
        if (res.ok) { alert('✅ Approvato!'); loadPosts(); }
        else alert('❌ Errore');
    } catch (e) { alert('❌ Errore: ' + e.message); }
}

async function rejectPost(id) {
    if (!confirm('Rifiutare questo post?')) return;
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/social_posts?id=eq.${id}`, {
            method: 'DELETE',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (res.ok) { alert('🗑️ Rimosso'); loadPosts(); }
        else alert('❌ Errore');
    } catch (e) { alert('❌ Errore: ' + e.message); }
}

function previewPost(id, platform) {
    const previewDiv = document.getElementById(`preview-${id}`);
    const editDiv = document.getElementById(`edit-${id}`);
    editDiv.style.display = 'none';
    
    if (previewDiv.style.display === 'block') {
        previewDiv.style.display = 'none';
        return;
    }
    
    const post = document.querySelector(`button[onclick*="previewPost(${id}"]`).closest('.post');
    const title = post.querySelector('.post-title').textContent;
    const body = post.querySelector('.post-content').textContent;
    const hashtags = post.querySelector('.hashtags').textContent;
    const source = post.querySelector('.source').textContent;
    
    if (platform === 'facebook') {
        previewDiv.innerHTML = `
            <div class="preview-box">
                <div class="preview-header">
                    <div class="preview-avatar">🎸</div>
                    <div>
                        <div class="preview-name">Babilonia - Investimenti in Oro</div>
                        <div class="preview-time">${new Date().toLocaleString('it-IT', {day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'})} · 🌐 Pubblico</div>
                    </div>
                </div>
                <div class="preview-content">${escapeHtml(title)}

${escapeHtml(body)}

<span class="preview-hashtags">${escapeHtml(hashtags)}</span></div>
                <div style="border-top: 1px solid #dddfe2; margin-top: 10px; padding-top: 10px; display: flex; justify-content: space-around; color: #65676b; font-size: 0.85rem;">
                    <span>👍 Mi piace</span>
                    <span>💬 Commenta</span>
                    <span>↗️ Condividi</span>
                </div>
            </div>
        `;
    }
    previewDiv.style.display = 'block';
}

function editPost(id, title, body, hashtags) {
    const editDiv = document.getElementById(`edit-${id}`);
    const previewDiv = document.getElementById(`preview-${id}`);
    previewDiv.style.display = 'none';
    
    if (editDiv.style.display === 'block') {
        editDiv.style.display = 'none';
        return;
    }
    
    editDiv.innerHTML = `
        <div class="edit-form">
            <label>Titolo / Hook:</label>
            <textarea id="edit-title-${id}">${unescapeHtml(title)}</textarea>
            <label style="margin-top:15px;">Contenuto:</label>
            <textarea id="edit-body-${id}">${unescapeHtml(body)}</textarea>
            <label style="margin-top:15px;">Hashtags:</label>
            <textarea id="edit-hashtags-${id}">${unescapeHtml(hashtags)}</textarea>
            <div style="margin-top:15px;">
                <button class="btn btn-approve" onclick="saveEdit(${id})">💾 Salva modifiche</button>
                <button class="btn btn-reject" onclick="editDiv.style.display='none'">Annulla</button>
            </div>
        </div>
    `;
    editDiv.style.display = 'block';
}

function unescapeHtml(text) {
    if (!text) return '';
    return text.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#039;/g, "'");
}

async function saveEdit(id) {
    const newTitle = document.getElementById(`edit-title-${id}`).value;
    const newBody = document.getElementById(`edit-body-${id}`).value;
    const newHashtags = document.getElementById(`edit-hashtags-${id}`).value;
    
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/social_posts?id=eq.${id}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ title: newTitle, body: newBody, hashtags: newHashtags })
        });
        if (res.ok) { alert('✅ Salvato!'); loadPosts(); }
        else alert('❌ Errore nel salvataggio');
    } catch (e) { alert('❌ Errore: ' + e.message); }
}

loadPosts();
setInterval(loadPosts, 30000);
</script>
</body>
</html>
