<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BABILONIA - Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: white; }
        .post { background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0; border-radius: 8px; }
        .error { color: #ff4444; }
        .success { color: #44ff44; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🎸 BABILONIA Test Post</h1>
    <button onclick="loadPosts()">Carica Post</button>
    <div id="result"></div>

<script>
const SUPABASE_URL = 'https://esgjushznmidzdhqsyyx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZ2p1c2h6bm1pZHpkaHFzeXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTYwMTcsImV4cCI6MjA5MTIzMjAxN30.cKWfWEkgRTtPKbUduGgNxX6gF18Gqkjg2bWn6twQTbs';

async function loadPosts() {
    const result = document.getElementById('result');
    result.innerHTML = '<p>Caricamento...</p>';
    
    try {
        const response = await fetch(SUPABASE_URL + '/rest/v1/social_posts?select=id,title,status&order=created_at.desc&limit=5', {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY
            }
        });
        
        if (!response.ok) {
            throw new Error('HTTP ' + response.status);
        }
        
        const posts = await response.json();
        
        if (posts.length === 0) {
            result.innerHTML = '<p class="error">Nessun post trovato</p>';
            return;
        }
        
        let html = '<h2 class="success">' + posts.length + ' post trovati:</h2>';
        posts.forEach(post => {
            html += '<div class="post">';
            html += '<strong>#' + post.id + '</strong> - ' + post.title.substring(0, 60) + '...<br>';
            html += 'Status: ' + post.status;
            html += '</div>';
        });
        
        result.innerHTML = html;
        
    } catch (err) {
        result.innerHTML = '<p class="error">Errore: ' + err.message + '</p>';
    }
}

// Carica automaticamente
loadPosts();
</script>
</body>
</html>
